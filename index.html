<!DOCTYPE html>
<html>
<head>
    <title>Teste Render</title>
</head>
<body style="background: #111; color: white; text-align: center; margin-top: 20%;">
    <h1>Deu certo! O Render está servindo o site.</h1>
    <button onclick="testarAPI()" style="padding: 15px; font-size: 18px; cursor: pointer; margin-top: 20px;">Testar Conexão com Neon</button>
    <p id="resultado" style="margin-top: 20px; color: #d4af37;"></p>

    <script>
        async function testarAPI() {
            document.getElementById('resultado').innerText = "Carregando...";
            const res = await fetch('/api/test-db');
            const data = await res.json();
            document.getElementById('resultado').innerText = JSON.stringify(data);
        }
    </script>
</body>
</html>
